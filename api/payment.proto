syntax = "proto3";

package api;
option go_package = ".;api";

import "common.proto";

enum PaymentStatus {
  PAYMENT_STATUS_UNSPECIFIED = 0;
  PAYMENT_STATUS_PENDING = 1;
  PAYMENT_STATUS_CONFIRMED = 2;
  PAYMENT_STATUS_FAILED = 3;
  PAYMENT_STATUS_CANCELLED = 4;
}

message Payment {
  string payment_id = 1;
  string order_id = 2;
  Money amount = 3;
  PaymentStatus status = 4;
  int64 created_at_unix = 5;
  int64 updated_at_unix = 6;
}

message StartPaymentRequest {
  string order_id = 1;
  Money amount = 2;
  string provider = 3;
}
message StartPaymentReply { Payment payment = 1; }

message GetPaymentRequest { string payment_id = 1; }
message GetPaymentReply { Payment payment = 1; }

service PaymentService {
  rpc StartPayment(StartPaymentRequest) returns (StartPaymentReply);
  rpc GetPayment(GetPaymentRequest) returns (GetPaymentReply);
}