syntax = "proto3";

package api;
option go_package = ".;api";

message Address {
  string name = 1;
  string street = 2;
  string zip = 3;
  string city = 4;
  string country = 5;
}

message Customer {
  string id = 1;
  string email = 2;
  string first_name = 3;
  string last_name = 4;
  Address default_address = 5;
  int64 created_at_unix = 6;
}

message CreateCustomerRequest {
  string email = 1;
  string first_name = 2;
  string last_name = 3;
  Address default_address = 4;
}

message CreateCustomerReply {
  Customer customer = 1;
}

message GetCustomerRequest {
  string id = 1;
}

message GetCustomerReply {
  Customer customer = 1;
}

service CustomerService {
  rpc CreateCustomer(CreateCustomerRequest) returns (CreateCustomerReply);
  rpc GetCustomer(GetCustomerRequest) returns (GetCustomerReply);
}