syntax = "proto3";

package api;
option go_package = ".;api";

import "common.proto";

message OrderItem {
  string sku = 1;
  int64 qty = 2;
  int64 unit_price_cents = 3;
  string currency = 4;
}

enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  ORDER_STATUS_CREATED = 1;
  ORDER_STATUS_RESERVATION_PENDING = 2;
  ORDER_STATUS_AWAITING_STOCK = 3;
  ORDER_STATUS_RESERVED = 4;
  ORDER_STATUS_PAYMENT_PENDING = 5;
  ORDER_STATUS_PAID = 6;
  ORDER_STATUS_READY_TO_SHIP = 7;
  ORDER_STATUS_SHIPPED = 8;
  ORDER_STATUS_CANCELLED = 9;
}

message Order {
  string id = 1;
  string customer_id = 2;
  repeated OrderItem items = 3;
  OrderStatus status = 4;
  int64 total_cents = 5;
  string currency = 6;
  int64 created_at_unix = 7;
  int64 updated_at_unix = 8;
}

message CreateOrderRequest {
  string customer_id = 1;
  repeated OrderItem items = 2;
}
message CreateOrderReply { Order order = 1; }

message GetOrderRequest { string id = 1; }
message GetOrderReply { Order order = 1; }

message CancelOrderRequest { string id = 1; }
message CancelOrderReply { Order order = 1; }

service OrderService {
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderReply);
  rpc GetOrder(GetOrderRequest) returns (GetOrderReply);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderReply);
}