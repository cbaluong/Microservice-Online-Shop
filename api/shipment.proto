syntax = "proto3";

package api;
option go_package = ".;api";

import "common.proto";

message ShipmentItem {
  string sku = 1;
  int64 qty = 2;
}

enum ShipmentStatus {
  SHIPMENT_STATUS_UNSPECIFIED = 0;
  SHIPMENT_STATUS_CREATED = 1;
  SHIPMENT_STATUS_DISPATCHED = 2;
  SHIPMENT_STATUS_DELIVERED = 3;
  SHIPMENT_STATUS_FAILED = 4;
}

message Shipment {
  string shipment_id = 1;
  string order_id = 2;
  Address address_snapshot = 3;
  repeated ShipmentItem items = 4;
  ShipmentStatus status = 5;
  string carrier = 6;
  string tracking_number = 7;
  int64 created_at_unix = 8;
  int64 updated_at_unix = 9;
}

message CreateShipmentRequest {
  string order_id = 1;
  Address address_snapshot = 2;
  repeated ShipmentItem items = 3;
}
message CreateShipmentReply { Shipment shipment = 1; }

message GetShipmentRequest { string shipment_id = 1; }
message GetShipmentReply { Shipment shipment = 1; }

service ShipmentService {
  rpc CreateShipment(CreateShipmentRequest) returns (CreateShipmentReply);
  rpc GetShipment(GetShipmentRequest) returns (GetShipmentReply);
}